name: CI Pipeline

on:
  pull_request:
    branches:
    - main
    - v*.*
    paths-ignore:
    - 'docs/**'
    - '**/*.md'
    - '**/*.adoc'

permissions: read-all

jobs:
  lint_and_test:
    name: Lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Enable Corepack
      run: corepack enable

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: '24'
        cache: 'yarn'
        cache-dependency-path: plugin/yarn.lock

    - name: Install dependencies
      working-directory: plugin
      env:
        # Lint/unit tests do not need the Cypress browser binary; downloading it
        # during yarn link can hang for a long time under Yarn hardened mode on
        # public PRs.
        CYPRESS_INSTALL_BINARY: '0'
        HUSKY: '0'
      run: yarn install --immutable

    - name: Lint
      working-directory: plugin
      run: yarn lint

    - name: Unit tests
      working-directory: plugin
      run: yarn test

  build_plugin:
    name: Build plugin
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Build image
      run: |
        make -e CONTAINER_VERSION=$(sed -rn 's/^VERSION \?= (.*)/\1/p' Makefile) build-plugin-image
